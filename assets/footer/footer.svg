<svg width="900" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ftBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="ftGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#00fff2"/>
    </linearGradient>
  </defs>
  <rect width="900" height="120" rx="16" fill="url(#ftBg)"/>
  <rect x="1.5" y="1.5" width="897" height="117" rx="15" fill="none" stroke="url(#ftGlow)" stroke-opacity="0.4"/>

  <rect x="60" y="20" width="780" height="1.5" fill="url(#ftGlow)" opacity="0.5"/>

  <text x="450" y="58" text-anchor="middle" font-family="Consolas, monospace" font-size="14" fill="#7dd3fc" letter-spacing="2">
    &gt; connection_established...
  </text>
  <text x="450" y="82" text-anchor="middle" font-family="Consolas, monospace" font-size="14" fill="#00fff2" letter-spacing="1.5">
    thanks for stopping by ⚡
  </text>

  <circle cx="430" cy="82" r="0" fill="none"/>
  <rect x="596" y="72" width="9" height="14" fill="#00fff2">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <rect x="60" y="98" width="780" height="1" fill="url(#ftGlow)" opacity="0.3"/>
</svg>
