<svg width="900" height="70" viewBox="0 0 900 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hudBorder" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#00fff2"/>
    </linearGradient>
  </defs>
  <rect width="900" height="70" rx="12" fill="#0d1526"/>
  <rect x="1" y="1" width="898" height="68" rx="11" fill="none" stroke="url(#hudBorder)" stroke-opacity="0.4"/>

  <!-- 8 equal segments separated by hairlines -->
  <g font-family="Consolas, monospace">
    <!-- STATUS -->
    <g transform="translate(10,0)">
      <circle cx="18" cy="35" r="5" fill="#00fff2"><animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/></circle>
      <text x="32" y="28" font-size="9" fill="#64748b" letter-spacing="1">STATUS</text>
      <text x="32" y="44" font-size="12" fill="#00fff2" font-weight="700">ONLINE</text>
    </g>
    <!-- BUILD -->
    <g transform="translate(122,0)">
      <text x="0" y="28" font-size="9" fill="#64748b" letter-spacing="1">BUILD</text>
      <text x="0" y="44" font-size="12" fill="#7dd3fc" font-weight="700">PASSING</text>
    </g>
    <!-- CORE -->
    <g transform="translate(234,0)">
      <text x="0" y="28" font-size="9" fill="#64748b" letter-spacing="1">CORE</text>
      <text x="0" y="44" font-size="12" fill="#e2e8f0" font-weight="700">JAVA + SPRING</text>
    </g>
    <!-- GIT -->
    <g transform="translate(370,0)">
      <text x="0" y="28" font-size="9" fill="#64748b" letter-spacing="1">GIT</text>
      <text x="0" y="44" font-size="12" fill="#00fff2" font-weight="700">CLEAN</text>
    </g>
    <!-- FOCUS -->
    <g transform="translate(452,0)">
      <text x="0" y="28" font-size="9" fill="#64748b" letter-spacing="1">FOCUS</text>
      <rect x="0" y="34" width="70" height="7" rx="3.5" fill="#1e293b"/>
      <rect x="0" y="34" width="60" height="7" rx="3.5" fill="#00fff2"/>
    </g>
    <!-- COFFEE -->
    <g transform="translate(548,0)">
      <text x="0" y="28" font-size="9" fill="#64748b" letter-spacing="1">☕ COFFEE</text>
      <rect x="0" y="34" width="70" height="7" rx="3.5" fill="#1e293b"/>
      <rect x="0" y="34" width="64" height="7" rx="3.5" fill="#7dd3fc"/>
    </g>
    <!-- ENERGY -->
    <g transform="translate(644,0)">
      <text x="0" y="28" font-size="9" fill="#64748b" letter-spacing="1">⚡ ENERGY</text>
      <rect x="0" y="34" width="70" height="7" rx="3.5" fill="#1e293b"/>
      <rect x="0" y="34" width="52" height="7" rx="3.5" fill="#0ea5e9">
        <animate attributeName="width" values="40;58;40" dur="2.4s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- UPTIME -->
    <g transform="translate(760,0)">
      <text x="0" y="28" font-size="9" fill="#64748b" letter-spacing="1">UPTIME</text>
      <text x="0" y="44" font-size="12" fill="#e2e8f0" font-weight="700">ALWAYS BUILDING</text>
    </g>
  </g>

  <g stroke="#1e293b" stroke-width="1">
    <line x1="112" y1="14" x2="112" y2="56"/>
    <line x1="224" y1="14" x2="224" y2="56"/>
    <line x1="360" y1="14" x2="360" y2="56"/>
    <line x1="442" y1="14" x2="442" y2="56"/>
    <line x1="538" y1="14" x2="538" y2="56"/>
    <line x1="634" y1="14" x2="634" y2="56"/>
    <line x1="750" y1="14" x2="750" y2="56"/>
  </g>
</svg>
