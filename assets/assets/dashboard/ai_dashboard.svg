<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dashBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#101a2e"/>
    </linearGradient>
    <linearGradient id="cardBorder" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#00fff2"/>
    </linearGradient>
    <filter id="cardGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="900" height="300" rx="16" fill="url(#dashBg)"/>
  <rect x="1.5" y="1.5" width="897" height="297" rx="15" fill="none" stroke="#0ea5e9" stroke-opacity="0.3"/>

  <text x="28" y="34" font-family="Consolas, monospace" font-size="15" fill="#00fff2" letter-spacing="2">◈ AI_CONTROL_CENTER // DEVELOPER_IDENTITY</text>
  <rect x="28" y="44" width="844" height="1.5" fill="url(#cardBorder)" opacity="0.5"/>

  <!-- helper: generates 6 HUD cards, 3 columns x 2 rows -->
  <g font-family="Consolas, monospace">
    <!-- Card 1 -->
    <g transform="translate(28,60)">
      <rect width="270" height="100" rx="10" fill="#0d1526" stroke="url(#cardBorder)" stroke-opacity="0.55"/>
      <rect x="0" y="0" width="4" height="100" fill="#00fff2"/>
      <text x="18" y="26" font-size="10.5" fill="#7dd3fc" letter-spacing="1.5">👤 DEVELOPER</text>
      <text x="18" y="54" font-size="18" fill="#e2e8f0" font-weight="600">Shivam Singh</text>
      <text x="18" y="78" font-size="10.5" fill="#64748b">status: active session</text>
    </g>

    <!-- Card 2 -->
    <g transform="translate(315,60)">
      <rect width="270" height="100" rx="10" fill="#0d1526" stroke="url(#cardBorder)" stroke-opacity="0.55"/>
      <rect x="0" y="0" width="4" height="100" fill="#0ea5e9"/>
      <text x="18" y="26" font-size="10.5" fill="#7dd3fc" letter-spacing="1.5">🎯 ROLE</text>
      <text x="18" y="52" font-size="15" fill="#e2e8f0" font-weight="600">Java Full Stack Developer</text>
      <text x="18" y="76" font-size="11" fill="#64748b">(Trainee)</text>
    </g>

    <!-- Card 3 -->
    <g transform="translate(602,60)">
      <rect width="270" height="100" rx="10" fill="#0d1526" stroke="url(#cardBorder)" stroke-opacity="0.55"/>
      <rect x="0" y="0" width="4" height="100" fill="#7dd3fc"/>
      <text x="18" y="26" font-size="10.5" fill="#7dd3fc" letter-spacing="1.5">🧭 CURRENT MISSION</text>
      <text x="18" y="50" font-size="13.5" fill="#e2e8f0" font-weight="600">Master Spring Boot</text>
      <text x="18" y="70" font-size="13.5" fill="#e2e8f0" font-weight="600">backend engineering</text>
    </g>

    <!-- Card 4 -->
    <g transform="translate(28,172)">
      <rect width="270" height="100" rx="10" fill="#0d1526" stroke="url(#cardBorder)" stroke-opacity="0.55"/>
      <rect x="0" y="0" width="4" height="100" fill="#00fff2"/>
      <text x="18" y="26" font-size="10.5" fill="#7dd3fc" letter-spacing="1.5">📦 CURRENT PROJECT</text>
      <text x="18" y="50" font-size="13.5" fill="#e2e8f0" font-weight="600">Portfolio</text>
      <text x="18" y="70" font-size="11.5" fill="#64748b">React + Three.js</text>
    </g>

    <!-- Card 5 -->
    <g transform="translate(315,172)">
      <rect width="270" height="100" rx="10" fill="#0d1526" stroke="url(#cardBorder)" stroke-opacity="0.55"/>
      <rect x="0" y="0" width="4" height="100" fill="#0ea5e9"/>
      <text x="18" y="26" font-size="10.5" fill="#7dd3fc" letter-spacing="1.5">📖 LEARNING</text>
      <text x="18" y="50" font-size="13.5" fill="#e2e8f0" font-weight="600">Spring Security</text>
      <text x="18" y="70" font-size="13.5" fill="#e2e8f0" font-weight="600">Hibernate / JPA</text>
    </g>

    <!-- Card 6 -->
    <g transform="translate(602,172)">
      <rect width="270" height="100" rx="10" fill="#0d1526" stroke="url(#cardBorder)" stroke-opacity="0.55"/>
      <rect x="0" y="0" width="4" height="100" fill="#7dd3fc"/>
      <text x="18" y="26" font-size="10.5" fill="#7dd3fc" letter-spacing="1.5">🌐 TIMEZONE</text>
      <text x="18" y="50" font-size="15" fill="#e2e8f0" font-weight="600">Asia/Kolkata</text>
      <text x="18" y="70" font-size="11.5" fill="#64748b">IST (UTC+5:30)</text>
    </g>
  </g>

  <!-- pulse indicator bottom right -->
  <circle cx="864" cy="284" r="4" fill="#00fff2">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
