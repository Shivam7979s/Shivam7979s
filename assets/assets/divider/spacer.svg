<svg width="900" height="10" viewBox="0 0 900 10" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00fff2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect y="4" width="900" height="1.6" fill="url(#spG)"/>
  <circle cy="5" r="2.5" fill="#00fff2">
    <animate attributeName="cx" values="0;900;0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
