<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="archBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#101a2e"/>
    </linearGradient>
    <linearGradient id="nodeBorder" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#00fff2"/>
    </linearGradient>
  </defs>
  <rect width="900" height="260" rx="16" fill="url(#archBg)"/>
  <rect x="1.5" y="1.5" width="897" height="257" rx="15" fill="none" stroke="#0ea5e9" stroke-opacity="0.3"/>

  <text x="28" y="32" font-family="Consolas, monospace" font-size="14" fill="#00fff2" letter-spacing="2">◈ SYSTEM_ARCHITECTURE.diagram() — target production path</text>

  <g font-family="Consolas, monospace" font-size="12.5" text-anchor="middle">
    <!-- Nodes -->
    <!-- React -->
    <g transform="translate(60,90)">
      <rect width="140" height="60" rx="10" fill="#0d1526" stroke="url(#nodeBorder)"/>
      <text x="70" y="26" fill="#7dd3fc" font-size="10.5">FRONTEND</text>
      <text x="70" y="44" fill="#e2e8f0" font-weight="700">React + TS</text>
    </g>

    <!-- Spring Boot -->
    <g transform="translate(280,90)">
      <rect width="150" height="60" rx="10" fill="#0d1526" stroke="url(#nodeBorder)"/>
      <text x="75" y="26" fill="#7dd3fc" font-size="10.5">BACKEND</text>
      <text x="75" y="44" fill="#e2e8f0" font-weight="700">Spring Boot</text>
    </g>

    <!-- Security -->
    <g transform="translate(510,30)">
      <rect width="130" height="52" rx="10" fill="#0d1526" stroke="url(#nodeBorder)"/>
      <text x="65" y="22" fill="#7dd3fc" font-size="10">AUTH LAYER</text>
      <text x="65" y="38" fill="#e2e8f0" font-weight="700" font-size="11.5">Security</text>
    </g>

    <!-- JPA / MySQL -->
    <g transform="translate(510,150)">
      <rect width="130" height="52" rx="10" fill="#0d1526" stroke="url(#nodeBorder)"/>
      <text x="65" y="22" fill="#7dd3fc" font-size="10">JPA / MYSQL</text>
      <text x="65" y="38" fill="#e2e8f0" font-weight="700" font-size="11.5">Database</text>
    </g>

    <!-- Cloud -->
    <g transform="translate(710,90)">
      <rect width="150" height="60" rx="10" fill="#0d1526" stroke="url(#nodeBorder)"/>
      <text x="75" y="26" fill="#7dd3fc" font-size="10.5">DEPLOYED ON</text>
      <text x="75" y="44" fill="#e2e8f0" font-weight="700" font-size="11.5">Railway / Vercel</text>
    </g>
  </g>

  <!-- animated connectors -->
  <g fill="none" stroke="#00fff2" stroke-width="2">
    <path d="M200 120 H280" stroke-dasharray="6 6">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <path d="M430 108 Q470 90 510 62" stroke-dasharray="6 6">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <path d="M430 132 Q470 150 510 176" stroke-dasharray="6 6">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <path d="M640 56 Q680 70 710 100" stroke-dasharray="6 6">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <path d="M640 176 Q680 160 710 130" stroke-dasharray="6 6">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <text x="240" y="112" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#64748b">REST API</text>

  <text x="450" y="238" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#64748b">
    Being built toward, one module at a time — currently strongest at the frontend + core Java layers.
  </text>
</svg>
