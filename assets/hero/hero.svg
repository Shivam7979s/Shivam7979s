<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="heroGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="55%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#00fff2"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00fff2" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00fff2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00fff2" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
    <filter id="glowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="220" rx="18" fill="url(#heroBg)"/>
  <rect width="900" height="220" rx="18" fill="url(#grid)" opacity="0.55"/>
  <rect x="1.5" y="1.5" width="897" height="217" rx="17" fill="none" stroke="#0ea5e9" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- corner brackets -->
  <g stroke="#00fff2" stroke-width="2" fill="none" opacity="0.85">
    <path d="M18 34 V18 H34"/>
    <path d="M882 18 H866 M882 18 V34"/>
    <path d="M18 186 V202 H34"/>
    <path d="M866 202 H882 V186"/>
  </g>

  <!-- scanning line -->
  <rect x="0" y="0" width="900" height="30" fill="url(#scanGrad)">
    <animate attributeName="y" values="-30;220" dur="3.6s" repeatCount="indefinite"/>
  </rect>

  <!-- status LED -->
  <circle cx="46" cy="46" r="5" fill="#00fff2">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="60" y="50" font-family="Consolas, monospace" font-size="12" fill="#7dd3fc" letter-spacing="2">SYSTEM ONLINE</text>

  <!-- title -->
  <text x="450" y="112" text-anchor="middle" font-family="Segoe UI, Consolas, monospace" font-size="46" font-weight="700" fill="url(#heroGlow)" filter="url(#glowBlur)" letter-spacing="4">
    SHIVAM SINGH
  </text>
  <text x="450" y="140" text-anchor="middle" font-family="Consolas, monospace" font-size="15" fill="#94a3b8" letter-spacing="3">
    JAVA FULL STACK DEVELOPER // TRAINEE BUILD
  </text>

  <!-- boot text -->
  <text x="450" y="176" text-anchor="middle" font-family="Consolas, monospace" font-size="12.5" fill="#0ea5e9" letter-spacing="1">
    <tspan>&gt; initializing developer_profile.exe</tspan>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="4s" repeatCount="indefinite"/>
  </text>
  <text x="450" y="176" text-anchor="middle" font-family="Consolas, monospace" font-size="12.5" fill="#00fff2" letter-spacing="1" opacity="0">
    <tspan>&gt; loading Java + Spring Boot stack... OK</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.25;0.35;0.9;1" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- bottom hairline -->
  <rect x="60" y="196" width="780" height="1.5" fill="url(#heroGlow)" opacity="0.5"/>
</svg>
